<!doctype html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — YOB Digital</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kantumruy+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" /></noscript>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --v-bg:  #02030c;
      --v-c:   #00f0ff;
      --v-p:   #e52c67;
      --v-pu:  #7b4fff;
    }
    html, body { background: var(--v-bg) !important; overflow: hidden; height: 100%; }
    .blob-1,.blob-2,#nav-placeholder,.mobile-drawer { display: none !important; }

    /* ── Canvas ── */
    #v-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Page scan line ── */
    body::after {
      content: '';
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,240,255,0.4) 40%, rgba(0,240,255,0.6) 50%, rgba(0,240,255,0.4) 60%, transparent 100%);
      box-shadow: 0 0 20px rgba(0,240,255,0.3);
      animation: v-scanline 8s linear infinite;
      z-index: 2; pointer-events: none;
    }
    @keyframes v-scanline {
      0%   { top: -4px; opacity: 0; }
      4%   { opacity: 1; }
      96%  { opacity: 1; }
      100% { top: 100vh; opacity: 0; }
    }

    /* ── Layout ── */
    .v-page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
      overflow: hidden;
    }

    /* ── Logo ── */
    .v-logo {
      position: fixed; top: 28px; left: 32px; z-index: 20;
      font-family: "Bebas Neue", sans-serif; font-size: 18px;
      color: rgba(255,255,255,0.28); letter-spacing: 2px; text-decoration: none;
    }
    .v-logo span { color: var(--v-p); }

    /* ── HUD corners ── */
    .v-hud {
      position: fixed; width: 44px; height: 44px;
      z-index: 5; pointer-events: none;
    }
    .v-hud::before, .v-hud::after {
      content: ''; position: absolute; background: var(--v-c); opacity: 0.35;
    }
    .v-hud.tl { top: 20px; left: 20px; }
    .v-hud.tl::before { top:0; left:0; width:22px; height:2px; }
    .v-hud.tl::after  { top:0; left:0; width:2px;  height:22px; }
    .v-hud.tr { top: 20px; right: 20px; }
    .v-hud.tr::before { top:0; right:0; width:22px; height:2px; }
    .v-hud.tr::after  { top:0; right:0; width:2px;  height:22px; }
    .v-hud.bl { bottom: 20px; left: 20px; }
    .v-hud.bl::before { bottom:0; left:0; width:22px; height:2px; }
    .v-hud.bl::after  { bottom:0; left:0; width:2px;  height:22px; }
    .v-hud.br { bottom: 20px; right: 20px; }
    .v-hud.br::before { bottom:0; right:0; width:22px; height:2px; }
    .v-hud.br::after  { bottom:0; right:0; width:2px;  height:22px; }

    /* ── Coordinates readout ── */
    .v-coords {
      position: fixed; bottom: 26px; right: 32px; z-index: 5;
      font-family: var(--fb); font-size: 9px; letter-spacing: 2px;
      color: rgba(0,240,255,0.25); text-align: right;
      pointer-events: none;
    }

    /* ── Center stage: hole + 404 overlaid ── */
    .v-stage {
      position: relative;
      width: clamp(280px, 50vw, 380px);
      height: clamp(280px, 50vw, 380px);
      margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Black hole layers */
    .v-halo {
      position: absolute; inset: -28px; border-radius: 50%;
      background: conic-gradient(from 0deg,
        transparent 0%, rgba(0,240,255,0.18) 20%,
        rgba(229,44,103,0.18) 48%, rgba(123,79,255,0.12) 72%, transparent 100%);
      filter: blur(28px);
      animation: v-spin-r 14s linear infinite;
    }
    .v-disk {
      position: absolute; inset: 10px; border-radius: 50%;
      background: conic-gradient(from 0deg,
        transparent 0%, var(--v-p) 10%, var(--v-pu) 28%, var(--v-c) 50%, transparent 68%);
      filter: blur(22px);
      animation: v-spin 4.5s linear infinite;
    }
    .v-ring1 {
      position: absolute; inset: 28px; border-radius: 50%;
      border: 1.5px solid rgba(0,240,255,0.65);
      box-shadow: 0 0 18px rgba(0,240,255,0.5), 0 0 44px rgba(0,240,255,0.15),
                  inset 0 0 18px rgba(0,240,255,0.08);
      animation: v-spin 9s linear infinite;
    }
    .v-ring2 {
      position: absolute; inset: 14px; border-radius: 50%;
      border: 1px solid rgba(229,44,103,0.28);
      animation: v-spin-r 6.5s linear infinite;
    }
    .v-void {
      position: absolute; inset: 58px; border-radius: 50%;
      background: #000;
      box-shadow: 0 0 60px #000, 0 0 120px rgba(0,0,0,0.95), inset 0 0 60px #000;
      z-index: 2;
    }

    /* ── 404 glitch text — overlaid on hole ── */
    .v-404 {
      position: relative; z-index: 4;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(120px, 24vw, 210px);
      line-height: 1; letter-spacing: 6px;
      color: #fff;
      text-shadow: 0 0 40px rgba(255,255,255,0.12);
      user-select: none;
    }
    .v-404::before, .v-404::after {
      content: '404';
      position: absolute; top: 0; left: 0; right: 0; pointer-events: none;
    }
    .v-404::before {
      color: var(--v-c);
      clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
      animation: v-glitch-a 5s steps(1) infinite;
    }
    .v-404::after {
      color: var(--v-p);
      clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
      animation: v-glitch-b 5s steps(1) infinite;
    }
    @keyframes v-glitch-a {
      0%,88%  { transform: none; opacity: 0; }
      89%     { transform: translate(-4px,-2px); opacity: 0.85; }
      91%     { transform: translate(4px, 1px);  opacity: 0.85; }
      93%     { transform: none; opacity: 0; }
      95%     { transform: translate(-2px,2px);  opacity: 0.6; }
      97%,100%{ transform: none; opacity: 0; }
    }
    @keyframes v-glitch-b {
      0%,88%  { transform: none; opacity: 0; }
      90%     { transform: translate(4px, 1px);  opacity: 0.85; }
      92%     { transform: translate(-4px,-2px); opacity: 0.85; }
      94%     { transform: none; opacity: 0; }
      96%     { transform: translate(2px,-1px);  opacity: 0.6; }
      98%,100%{ transform: none; opacity: 0; }
    }

    /* ── Sub label ── */
    .v-label {
      font-family: var(--fb); font-size: 10px;
      letter-spacing: 5px; text-transform: uppercase;
      color: rgba(0,240,255,0.5);
      margin-bottom: 36px;
    }

    /* ── Button ── */
    .v-btn {
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid rgba(0,240,255,0.4); color: rgba(0,240,255,0.8);
      padding: 13px 34px; border-radius: 50px;
      font-family: var(--fb); font-size: 11px;
      font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
      text-decoration: none; transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .v-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,240,255,0.1);
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
    }
    .v-btn:hover {
      color: #fff; border-color: rgba(0,240,255,0.9);
      box-shadow: 0 0 32px rgba(0,240,255,0.28);
      transform: translateY(-2px);
    }
    .v-btn:hover::before { transform: scaleX(1); }

    @keyframes v-spin   { to { transform: rotate(360deg); } }
    @keyframes v-spin-r { to { transform: rotate(-360deg); } }

    @media (max-width: 480px) {
      .v-stage { width: 240px; height: 240px; }
      .v-void  { inset: 42px; }
      .v-ring1 { inset: 20px; }
    }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <canvas id="v-canvas" aria-hidden="true"></canvas>

  <div id="nav-placeholder"></div>
  <div class="mobile-drawer" id="mobileDrawer">
    <button class="drawer-close" id="drawerClose"><i class="fas fa-times"></i></button>
    <a href="index.html" onclick="closeDrawer()">Home</a>
  </div>

  <!-- HUD -->
  <div class="v-hud tl"></div>
  <div class="v-hud tr"></div>
  <div class="v-hud bl"></div>
  <div class="v-hud br"></div>
  <a href="index.html" class="v-logo">យប់<span>.</span>ឌីជីថល</a>
  <div class="v-coords" id="vCoords">LAT 13.3671° N<br>LNG 103.8448° E</div>

  <div class="v-page">
    <!-- Black hole + 404 overlaid -->
    <div class="v-stage" aria-hidden="true">
      <div class="v-halo"></div>
      <div class="v-disk"></div>
      <div class="v-ring2"></div>
      <div class="v-ring1"></div>
      <div class="v-void"></div>
      <div class="v-404">404</div>
    </div>

    <div class="v-label">Signal Not Found</div>

    <a href="index.html" class="v-btn">
      <i class="fas fa-arrow-left"></i> Return to Base
    </a>
  </div>

  <script>
  (function () {
    const c = document.getElementById('v-canvas');
    const ctx = c.getContext('2d');
    let stars = [], W, H;
    function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
    function mkStars() {
      stars = [];
      const n = Math.floor((W * H) / 3800);
      for (let i = 0; i < n; i++) stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.2+0.15,
        o: Math.random()*0.55+0.1,
        sp: Math.random()*0.003+0.001,
        ph: Math.random()*Math.PI*2,
        col: Math.random()>0.9 ? '0,240,255,' : '255,255,255,'
      });
    }
    let t = 0;
    function draw() {
      ctx.clearRect(0,0,W,H);
      t++;
      stars.forEach(s => {
        const o = s.o*(0.55+0.45*Math.sin(t*s.sp+s.ph));
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle='rgba('+s.col+o+')';
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); mkStars(); draw();
    window.addEventListener('resize',()=>{ resize(); mkStars(); });

    // Live coords
    const coordEl = document.getElementById('vCoords');
    setInterval(()=>{
      const v = (Date.now()/1000).toFixed(0);
      coordEl.innerHTML = `SIG·LOST·${v}<br>ERR·404·NULL`;
    }, 2000);
  })();
  </script>
  <script src="js/load-components.js"></script>
  <script src="js/main.js" defer></script>
</body>
</html>
