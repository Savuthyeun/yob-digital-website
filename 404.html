    /* ═══════════════════════════════════════
       THE BLACK HOLE — 404 Page
    ═══════════════════════════════════════ */
    :root {
      --fof-bg:   #030510;
      --fof-cyan: #00f0ff;
      --fof-pink: #e52c67;
      --fof-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    html, body { background: var(--fof-bg) !important; }
    .blob-1, .blob-2 { display: none !important; }
    #nav-placeholder { display: none !important; }
    .mobile-drawer  { display: none !important; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(229,44,103,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(0,240,255,0.03) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Starfield canvas */
    #fof-stars {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
    }

    /* Page layout */
    .fof-page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px 60px;
      text-align: center;
      position: relative; z-index: 10;
    }

    /* ── BLACK HOLE ── */
    .fof-hole {
      position: relative;
      width: 280px; height: 280px;
      margin: 0 auto 48px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Outer glow halo */
    .fof-halo {
      position: absolute; inset: -20px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(0,240,255,0.12) 25%,
        rgba(229,44,103,0.12) 50%,
        rgba(123,79,255,0.08) 75%,
        transparent 100%
      );
      filter: blur(20px);
      animation: fof-spinR 12s linear infinite;
    }

    /* Accretion disk */
    .fof-disk {
      position: absolute; inset: 10px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        var(--fof-pink) 15%,
        #7b4fff 35%,
        var(--fof-cyan) 55%,
        transparent 75%
      );
      filter: blur(22px);
      animation: fof-spin 5s linear infinite;
    }

    /* Photon ring */
    .fof-photon {
      position: absolute; inset: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,240,255,0.5);
      box-shadow:
        0 0 12px rgba(0,240,255,0.4),
        0 0 30px rgba(0,240,255,0.15),
        inset 0 0 12px rgba(0,240,255,0.1);
      animation: fof-spin 8s linear infinite;
    }

    /* Event horizon — absolute void */
    .fof-void {
      position: absolute; inset: 56px;
      border-radius: 50%;
      background: #000;
      box-shadow:
        0 0 40px #000,
        0 0 80px rgba(0,0,0,0.8),
        inset 0 0 40px #000;
      z-index: 2;
    }

    /* Typography */
    .fof-code {
      font-family: var(--fof-mono);
      font-size: 11px; letter-spacing: 5px;
      color: var(--fof-pink);
      text-shadow: 0 0 10px rgba(229,44,103,0.5);
      margin-bottom: 12px;
      display: block;
    }

    .fof-title {
      font-family: var(--fh);
      font-size: clamp(56px, 10vw, 108px);
      line-height: 0.88; letter-spacing: 4px;
      color: var(--white);
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
      margin-bottom: 24px;
    }

    .fof-desc {
      font-family: var(--fb);
      font-size: 16px; color: rgba(255,255,255,0.45);
      max-width: 460px; line-height: 1.85;
      margin-bottom: 48px;
    }
    .fof-desc strong { color: rgba(255,255,255,0.75); }

    /* Home button */
    .fof-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: transparent;
      border: 1px solid var(--fof-cyan);
      color: var(--fof-cyan);
      padding: 16px 36px;
      border-radius: 50px;
      font-family: var(--fof-mono); font-size: 11px;
      font-weight: 700; letter-spacing: 2px;
      text-decoration: none; text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      position: relative; overflow: hidden;
    }
    .fof-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--fof-cyan);
      transform: translateX(-101%);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      z-index: -1;
    }
    .fof-btn:hover {
      color: var(--fof-bg);
      box-shadow: 0 0 30px rgba(0,240,255,0.45);
      transform: translateY(-3px);
    }
    .fof-btn:hover::before { transform: translateX(0); }

    /* Keyframes */
    @keyframes fof-spin  { to { transform: rotate(360deg); } }
    @keyframes fof-spinR { to { transform: rotate(-360deg); } }

    @media (max-width: 480px) {
      .fof-hole { width: 200px; height: 200px; }
      .fof-void { inset: 40px; }
      .fof-photon { inset: 22px; }
    }
  </style>

  <script>
  (function () {
    const c   = document.getElementById('fof-stars');
    const ctx = c.getContext('2d');
    let stars = [];

    function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
    function mkStars() {
      stars = [];
      const n = Math.floor((c.width * c.height) / 4500);
      for (let i = 0; i < n; i++) {
        stars.push({
          x:  Math.random() * c.width,
          y:  Math.random() * c.height,
          r:  Math.random() * 1.3 + 0.1,
          o:  Math.random() * 0.5 + 0.08,
          sp: Math.random() * 0.003 + 0.001,
          ph: Math.random() * Math.PI * 2,
          col: Math.random() > 0.85 ? '0,240,255,' : '255,255,255,'
        });
      }
    }
    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, c.width, c.height);
      t++;
      stars.forEach(s => {
        const o = s.o * (0.6 + 0.4 * Math.sin(t * s.sp + s.ph));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + s.col + o + ')';
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); mkStars(); draw();
    window.addEventListener('resize', () => { resize(); mkStars(); });
  })();
  </script>
